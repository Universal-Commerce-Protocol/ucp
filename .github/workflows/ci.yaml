name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-validate:
    name: Test and Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests mkdocs
          # Projenin kendi gereksinimleri varsa kuruyoruz
          if [ -f requirements-docs.txt ]; then pip install -r requirements-docs.txt; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install ucp-schema
        run: cargo install ucp-schema

      - name: Run Unit Tests
        run: |
          python scripts/test_validate_examples.py
          python scripts/test_check_links.py

      - name: Validate JSON Examples
        run: |
          # Çıktıyı JSON olarak al ve hata varsa GitHub Annotation Formatına (::error) çevir
          python scripts/validate_examples.py --schema-base source/schemas/ --format json > validate_results.json || true
          jq -r '.[] | "::error file=\(.file),line=\(.line)::\(.message)"' validate_results.json
          
          # Dosyada hata varsa adımı fail et
          if [ "$(jq length validate_results.json)" -gt 0 ]; then exit 1; fi

      - name: Build MkDocs
        run: |
          # DOCS_MODE=spec veriyoruz ki hooks.py tüm schema dosyalarını local_preview içine kopyalasın
          export DOCS_MODE=spec
          mkdocs build -d local_preview

      - name: Check Links
        run: |
          # Kırık linkleri JSON olarak al ve GitHub Annotation'a çevir
          python scripts/check_links.py local_preview --check-external --format json > link_results.json || true
          
          # Hataları satır içi notlara çevir
          jq -r '.[] | "::error file=\(.file)::[\(.version)] \(.error)"' link_results.json
          
          # Dosyada kırık link varsa adımı fail et
          if [ "$(jq length link_results.json)" -gt 0 ]; then exit 1; fi